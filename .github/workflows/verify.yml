name: Verify

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest discover -s tests -v
      - run: python scripts/run_evaluation.py --offline --output artifacts/evaluation.json

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: npm ci
        working-directory: frontend
      - run: VITE_API_BASE=http://127.0.0.1:8000 npm run build
        working-directory: frontend
      - run: API_ALLOWED_ORIGINS=http://127.0.0.1:4173 python -m uvicorn api.main:app --host 127.0.0.1 --port 8000 > api-e2e.log 2>&1 &
      - run: curl --retry 15 --retry-connrefused --retry-delay 2 --fail http://127.0.0.1:8000/health/ready
      - run: npm run preview -- --host 127.0.0.1 --port 4173 > frontend-e2e.log 2>&1 &
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - run: docker build --tag federated-data-agent:ci .
